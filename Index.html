<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👀</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffe6f2;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:#ff3d7f;
    font-size:2.2rem;
}

button{
    padding:12px 22px;
    margin:10px;
    border:none;
    border-radius:12px;
    font-size:1.1rem;
    cursor:pointer;
}

#yesBtn{
    background:#4CAF50;
    color:white;
    transition: transform 0.2s ease;
}

#noBtn{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

#msg{
    margin-top:20px;
    font-size:2rem;
    color:#ff3d7f;
}
</style>
</head>

<body>

<div class="container">
    <h1>¿Me aceptás una salida? 👉👈</h1>

    <button id="yesBtn">Sí</button>
    <button id="noBtn">No</button>

    <div id="msg"></div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const msg = document.getElementById("msg");

let scale = 1;

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.25;
    yesBtn.style.transform = `scale(${scale})`;
});

noBtn.addEventListener("click", () => {
    // por si lo toca igual en celu
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.25;
    yesBtn.style.transform = `scale(${scale})`;
});

yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#ffe6f2;
            font-family:Arial;
            text-align:center;">
            
            <h1 style="color:#ff3d7f;font-size:3rem;">
                jiji 💗
            </h1>
            <p style="font-size:2rem;color:#333;">
                I ♡ you
            </p>
        </div>
    `;
});
</script>

</body>
</html>
