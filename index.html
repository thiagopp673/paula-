<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holiss</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffe6f2;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:#ff3d7f;
    font-size:2.2rem;
}

/* 🌟 BOTONES MEJORADOS */
button{
    padding:14px 26px;
    margin:10px;
    border:none;
    border-radius:50px;
    font-size:1.1rem;
    cursor:pointer;
    transition: all 0.25s ease;
    font-weight:600;
}

/* 💚 YES */
#yesBtn{
    background: linear-gradient(135deg, #4CAF50, #2ecc71);
    color:white;
    box-shadow: 0 6px 15px rgba(76,175,80,0.3);
}

#yesBtn:hover{
    transform: scale(1.1);
    box-shadow: 0 10px 20px rgba(76,175,80,0.4);
}

/* ❤️ NO */
#noBtn{
    background: linear-gradient(135deg, #ff4d4d, #ff6b81);
    color:white;
    position:absolute;
    box-shadow: 0 6px 15px rgba(255,77,77,0.3);
}

#noBtn:hover{
    transform: scale(1.1);
    box-shadow: 0 10px 20px rgba(255,77,77,0.4);
}

</style>
</head>

<body>

<div class="container">

    <!-- 🔥 GIF ORIGINAL -->
    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" width="200">

    <h1>¿Me aceptás una salida? 👉👈</h1>

    <button id="yesBtn">Sí</button>
    <button id="noBtn">No</button>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let scale = 1;

/* 😭 BOTÓN NO ESCAPISTA */
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.25;
    yesBtn.style.transform = `scale(${scale})`;
});

noBtn.addEventListener("click", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.25;
    yesBtn.style.transform = `scale(${scale})`;
});

/* 💚 CLICK EN SÍ */
yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#ffe6f2;
            font-family:Arial;
            text-align:center;
            gap:20px;">

            <!-- 🐱 GATITO CON FLORES -->
            <img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" width="220">

            <h1 style="color:#ff3d7f;font-size:3rem;">
                jiji 💗
            </h1>

            <p style="font-size:2rem;color:#333;">
                I ♡ you
            </p>

        </div>
    `;
});

</script>

</body>
</html>
