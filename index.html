<!-- force update -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holiss</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#dff3ff; /* 💙 azul suave */
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* 💙 corazones decorativos */
.heart{
    position:absolute;
    font-size:28px;
    color:#6ec6ff;
    opacity:0.6;
}

.heart.top-left{ top:15px; left:15px; }
.heart.top-right{ top:15px; right:15px; }
.heart.bottom-left{ bottom:15px; left:15px; }
.heart.bottom-right{ bottom:15px; right:15px; }

.container{
    text-align:center;
}

h1{
    color:#1e88e5;
    font-size:2.2rem;
}

/* BOTONES */
button{
    padding:14px 26px;
    margin:10px;
    border:none;
    border-radius:50px;
    font-size:1.1rem;
    cursor:pointer;
    transition: all 0.25s ease;
    font-weight:600;
}

/* YES */
#yesBtn{
    background: linear-gradient(135deg, #42a5f5, #1e88e5);
    color:white;
    box-shadow: 0 6px 15px rgba(30,136,229,0.3);
}

/* NO */
#noBtn{
    background: linear-gradient(135deg, #64b5f6, #42a5f5);
    color:white;
    position:absolute;
    box-shadow: 0 6px 15px rgba(30,136,229,0.25);
}

/* OSO */
#bear{
    width:220px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<!-- 💙 corazones esquina -->
<div class="heart top-left">💙</div>
<div class="heart top-right">💙</div>
<div class="heart bottom-left">💙</div>
<div class="heart bottom-right">💙</div>

<div class="container">

    <!-- 🐻 OSO -->
    <img id="bear" src="https://i.pinimg.com/736x/c2/4b/a8/c24ba8b2295c7bc9cabe96857f08a08c.jpg">

    <h1>¿Me aceptás una salida? 👉👈</h1>

    <button id="yesBtn">Sí</button>
    <button id="noBtn">No</button>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let scale = 1;

/* NO ESCAPA */
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.25;
    yesBtn.style.transform = `scale(${scale})`;
});

noBtn.addEventListener("click", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    scale += 0.25;
    yesBtn.style.transform = `scale(${scale})`;
});

/* 💙 SÍ */
yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#dff3ff;
            font-family:Arial;
            text-align:center;
            gap:20px;">

            <img src="https://i.pinimg.com/736x/58/91/cb/5891cb1892a3b31b49223f5b082091b9.jpg" width="260">

            <h1 style="color:#1e88e5;font-size:3rem;">
                jiji 💙
            </h1>

            <p style="font-size:2rem;color:#1e88e5;">
                I ♡ you
            </p>

        </div>
    `;
});

</script>

</body>
</html>
